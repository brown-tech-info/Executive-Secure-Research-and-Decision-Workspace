scrDashboard As Screen:
    OnVisible: |-
        =Concurrent(
            Set(gblDraftCount, CountRows(Filter(Draft, ID > 0))),
            Set(gblReviewCount, CountRows(Filter(Review, ID > 0))),
            Set(gblApprovedCount, CountRows(Filter(Approved, ID > 0))),
            Set(gblArchiveCount, CountRows(Filter(Archive, ID > 0)))
        );
        Set(gblLastRefresh, Now());

    cmpNav_Dashboard As cmpNavPanel:
        ActiveScreen: ="scrDashboard"
        X: =0
        Y: =0
        Width: =220
        Height: =Parent.Height

    lblScreenTitle As Label:
        Text: ="Executive Workspace"
        X: =240
        Y: =16
        Width: =400
        Height: =40
        Size: =28
        FontWeight: =FontWeight.Semibold
        Color: =RGBA(50, 49, 48, 1)

    btnRefresh As Button:
        Text: ="↻ Refresh"
        X: =Parent.Width - 160
        Y: =20
        Width: =120
        Height: =36
        Fill: =RGBA(0, 120, 212, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =4
        OnSelect: |-
            =Concurrent(
                Set(gblDraftCount, CountRows(Filter(Draft, ID > 0))),
                Set(gblReviewCount, CountRows(Filter(Review, ID > 0))),
                Set(gblApprovedCount, CountRows(Filter(Approved, ID > 0))),
                Set(gblArchiveCount, CountRows(Filter(Archive, ID > 0)))
            );
            Set(gblLastRefresh, Now());
            Notify("Dashboard refreshed", NotificationType.Information);

    lblLastRefresh As Label:
        Text: =Concatenate("Last updated // ", Text(gblLastRefresh, "HH:mm"))
        X: =Parent.Width - 280
        Y: =24
        Width: =120
        Height: =28
        Size: =11
        Color: =RGBA(96, 94, 92, 1)

    rectCardDraft As Rectangle:
        X: =240
        Y: =80
        Width: =(Parent.Width - 296) / 4
        Height: =120
        Fill: =RGBA(255, 255, 255, 1)
        BorderColor: =RGBA(237, 235, 233, 1)
        BorderThickness: =1
        BorderRadius: =8

    lblDraftLabel As Label:
        Text: ="Draft"
        X: =252
        Y: =88
        Width: =120
        Height: =20
        Size: =12
        Color: =RGBA(96, 94, 92, 1)

    lblDraftCount As Label:
        Text: =Text(gblDraftCount)
        X: =252
        Y: =108
        Width: =120
        Height: =48
        Size: =36
        FontWeight: =FontWeight.Light
        Color: =RGBA(0, 120, 212, 1)

    rectDraftAccent As Rectangle:
        X: =240
        Y: =197
        Width: =(Parent.Width - 296) / 4
        Height: =3
        Fill: =RGBA(0, 120, 212, 1)

    rectCardReview As Rectangle:
        X: =240 + (Parent.Width - 296) / 4 + 16
        Y: =80
        Width: =(Parent.Width - 296) / 4
        Height: =120
        Fill: =RGBA(255, 255, 255, 1)
        BorderColor: =RGBA(237, 235, 233, 1)
        BorderThickness: =1
        BorderRadius: =8

    lblReviewLabel As Label:
        Text: ="Review"
        X: =252 + (Parent.Width - 296) / 4 + 16
        Y: =88
        Width: =120
        Height: =20
        Size: =12
        Color: =RGBA(96, 94, 92, 1)

    lblReviewCount As Label:
        Text: =Text(gblReviewCount)
        X: =252 + (Parent.Width - 296) / 4 + 16
        Y: =108
        Width: =120
        Height: =48
        Size: =36
        FontWeight: =FontWeight.Light
        Color: =RGBA(255, 185, 0, 1)

    rectReviewAccent As Rectangle:
        X: =240 + (Parent.Width - 296) / 4 + 16
        Y: =197
        Width: =(Parent.Width - 296) / 4
        Height: =3
        Fill: =RGBA(255, 185, 0, 1)

    rectCardApproved As Rectangle:
        X: =240 + ((Parent.Width - 296) / 4 + 16) * 2
        Y: =80
        Width: =(Parent.Width - 296) / 4
        Height: =120
        Fill: =RGBA(255, 255, 255, 1)
        BorderColor: =RGBA(237, 235, 233, 1)
        BorderThickness: =1
        BorderRadius: =8

    lblApprovedLabel As Label:
        Text: ="Approved"
        X: =252 + ((Parent.Width - 296) / 4 + 16) * 2
        Y: =88
        Width: =120
        Height: =20
        Size: =12
        Color: =RGBA(96, 94, 92, 1)

    lblApprovedCount As Label:
        Text: =Text(gblApprovedCount)
        X: =252 + ((Parent.Width - 296) / 4 + 16) * 2
        Y: =108
        Width: =120
        Height: =48
        Size: =36
        FontWeight: =FontWeight.Light
        Color: =RGBA(16, 124, 16, 1)

    rectApprovedAccent As Rectangle:
        X: =240 + ((Parent.Width - 296) / 4 + 16) * 2
        Y: =197
        Width: =(Parent.Width - 296) / 4
        Height: =3
        Fill: =RGBA(16, 124, 16, 1)

    rectCardArchive As Rectangle:
        X: =240 + ((Parent.Width - 296) / 4 + 16) * 3
        Y: =80
        Width: =(Parent.Width - 296) / 4
        Height: =120
        Fill: =RGBA(255, 255, 255, 1)
        BorderColor: =RGBA(237, 235, 233, 1)
        BorderThickness: =1
        BorderRadius: =8

    lblArchiveLabel As Label:
        Text: ="Archive"
        X: =252 + ((Parent.Width - 296) / 4 + 16) * 3
        Y: =88
        Width: =120
        Height: =20
        Size: =12
        Color: =RGBA(96, 94, 92, 1)

    lblArchiveCount As Label:
        Text: =Text(gblArchiveCount)
        X: =252 + ((Parent.Width - 296) / 4 + 16) * 3
        Y: =108
        Width: =120
        Height: =48
        Size: =36
        FontWeight: =FontWeight.Light
        Color: =RGBA(115, 115, 115, 1)

    rectArchiveAccent As Rectangle:
        X: =240 + ((Parent.Width - 296) / 4 + 16) * 3
        Y: =197
        Width: =(Parent.Width - 296) / 4
        Height: =3
        Fill: =RGBA(115, 115, 115, 1)

    galUpcomingMeetings As Gallery.galleryVertical:
        X: =240
        Y: =220
        Width: =(Parent.Width - 272) / 2
        Height: =280
        Fill: =RGBA(255, 255, 255, 1)
        BorderColor: =RGBA(237, 235, 233, 1)
        BorderThickness: =1
        BorderRadius: =8
        TemplatePadding: =8
        TemplateSize: =48
        Items: |-
            =SortByColumns(
                Filter(
                    Approved,
                    ExecWS_MeetingDate >= Today()
                ),
                "ExecWS_MeetingDate", SortOrder.Ascending
            )

        lblUpcomingTitle As Label:
            Text: ="Upcoming Meetings"
            X: =12
            Y: =0
            Width: =200
            Height: =32
            Size: =16
            FontWeight: =FontWeight.Semibold
            Color: =RGBA(50, 49, 48, 1)

        icoMeetingType As Classic/Icon:
            Icon: |-
                =Switch(
                    ThisItem.ExecWS_MeetingType.Value,
                    "Board", Icon.People,
                    "SteerCo", Icon.Waypoint,
                    "ExecTeam", Icon.Group,
                    Icon.Calendar
                )
            X: =12
            Y: =8
            Width: =24
            Height: =24
            Color: =RGBA(0, 120, 212, 1)

        lblMeetingCycle As Label:
            Text: =ThisItem.ExecWS_MeetingCycle
            X: =44
            Y: =4
            Width: =200
            Height: =20
            Size: =14
            FontWeight: =FontWeight.Semibold

        lblMeetingDate As Label:
            Text: =Text(ThisItem.ExecWS_MeetingDate, "dd MMM yyyy")
            X: =44
            Y: =24
            Width: =200
            Height: =18
            Size: =11
            Color: =RGBA(96, 94, 92, 1)

    btnNewDocument As Button:
        Text: ="+ New Document"
        X: =240
        Y: =520
        Width: =180
        Height: =40
        Fill: =RGBA(0, 120, 212, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =4
        Visible: =gblIsAuthor
        OnSelect: =Navigate(scrDocUpload, ScreenTransition.None)

    btnPendingReviews As Button:
        Text: ="Pending Reviews"
        X: =436
        Y: =520
        Width: =180
        Height: =40
        Fill: =RGBA(255, 185, 0, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =4
        Visible: =gblIsReviewer
        OnSelect: =Navigate(scrApprovals, ScreenTransition.None)

    btnArchiveDocs As Button:
        Text: ="Archive Documents"
        X: =632
        Y: =520
        Width: =180
        Height: =40
        Fill: =RGBA(115, 115, 115, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =4
        Visible: =gblIsCompliance
        OnSelect: =Navigate(scrArchiveMgmt, ScreenTransition.None)
