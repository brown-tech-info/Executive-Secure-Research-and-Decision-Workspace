cmpNavPanel As Component:
    CustomProperty.ActiveScreen As Text: ="scrDashboard"

    Width: =220
    Height: =Parent.Height

    rectNavBg As Rectangle:
        X: =0
        Y: =0
        Width: =Parent.Width
        Height: =Parent.Height
        Fill: =RGBA(32, 31, 30, 1)

    imgNavLogo As Image:
        Image: ="data:image/svg+xml;base64,"
        X: =16
        Y: =16
        Width: =188
        Height: =40

    lblNavAppName As Label:
        Text: ="ExecWorkspace"
        X: =16
        Y: =24
        Width: =188
        Height: =28
        Size: =16
        FontWeight: =FontWeight.Bold
        Color: =RGBA(255, 255, 255, 1)

    btnNavDashboard As Button:
        Text: ="🏠  Dashboard"
        X: =8
        Y: =76
        Width: =204
        Height: =40
        Fill: =If(cmpNavPanel.ActiveScreen = "scrDashboard", RGBA(0, 120, 212, 0.2), Transparent)
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =4
        Align: =Align.Left
        PaddingLeft: =12
        Size: =13
        OnSelect: =Navigate(scrDashboard, ScreenTransition.Fade)

    btnNavDocBrowser As Button:
        Text: ="📄  Documents"
        X: =8
        Y: =120
        Width: =204
        Height: =40
        Fill: =If(cmpNavPanel.ActiveScreen = "scrDocBrowser", RGBA(0, 120, 212, 0.2), Transparent)
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =4
        Align: =Align.Left
        PaddingLeft: =12
        Size: =13
        OnSelect: =Navigate(scrDocBrowser, ScreenTransition.Fade)

    btnNavUpload As Button:
        Text: ="📤  Upload"
        X: =8
        Y: =164
        Width: =204
        Height: =40
        Fill: =If(cmpNavPanel.ActiveScreen = "scrDocUpload", RGBA(0, 120, 212, 0.2), Transparent)
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =4
        Align: =Align.Left
        PaddingLeft: =12
        Size: =13
        Visible: =gblIsAuthor
        OnSelect: =Navigate(scrDocUpload, ScreenTransition.Fade)

    btnNavApprovals As Button:
        Text: ="✅  Approvals"
        X: =8
        Y: =If(gblIsAuthor, 208, 164)
        Width: =204
        Height: =40
        Fill: =If(cmpNavPanel.ActiveScreen = "scrApprovals", RGBA(0, 120, 212, 0.2), Transparent)
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =4
        Align: =Align.Left
        PaddingLeft: =12
        Size: =13
        Visible: =gblIsReviewer
        OnSelect: =Navigate(scrApprovals, ScreenTransition.Fade)

    btnNavAI As Button:
        Text: ="🤖  AI Assistant"
        X: =8
        Y: |-
            =76 + 44 +
            If(gblIsAuthor, 44, 0) + If(gblIsReviewer, 44, 0) + 44 + 44
        Width: =204
        Height: =40
        Fill: =If(cmpNavPanel.ActiveScreen = "scrAIAssistant", RGBA(0, 120, 212, 0.2), Transparent)
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =4
        Align: =Align.Left
        PaddingLeft: =12
        Size: =13
        Visible: =gblIsExecutive
        OnSelect: =Navigate(scrAIAssistant, ScreenTransition.Fade)

    btnNavArchive As Button:
        Text: ="🗄  Archive"
        X: =8
        Y: |-
            =76 + 44 +
            If(gblIsAuthor, 44, 0) + If(gblIsReviewer, 44, 0) +
            If(gblIsExecutive, 44, 0) + 44 + 44
        Width: =204
        Height: =40
        Fill: =If(cmpNavPanel.ActiveScreen = "scrArchiveMgmt", RGBA(0, 120, 212, 0.2), Transparent)
        Color: =RGBA(255, 255, 255, 1)
        BorderRadius: =4
        Align: =Align.Left
        PaddingLeft: =12
        Size: =13
        Visible: =gblIsCompliance
        OnSelect: =Navigate(scrArchiveMgmt, ScreenTransition.Fade)

    lblNavUser As Label:
        Text: =gblUserDisplayName
        X: =12
        Y: =Parent.Height - 60
        Width: =196
        Height: =24
        Size: =12
        Color: =RGBA(200, 200, 200, 1)

    lblNavRole As Label:
        Text: |-
            =If(
                gblIsAdmin, "Platform Admin",
                gblIsCompliance, "Compliance",
                gblIsExecutive, "Executive",
                gblIsReviewer, "Reviewer",
                gblIsAuthor, "Author",
                "No Role"
            )
        X: =12
        Y: =Parent.Height - 38
        Width: =196
        Height: =20
        Size: =10
        Color: =RGBA(160, 160, 160, 1)
