scrDocBrowser As Screen:
    OnVisible: |-
        =Set(locShowDraft, gblIsAuthor || gblIsAdmin);
        Set(locShowReview, gblIsReviewer || gblIsAuthor || gblIsAdmin);
        Set(locShowApproved, gblIsExecutive || gblIsReviewer || gblIsCompliance || gblIsAdmin);
        Set(locShowArchive, gblIsCompliance || gblIsAdmin);
        Set(
            locActiveTab,
            If(
                gblIsAuthor, "Draft",
                gblIsReviewer, "Review",
                gblIsExecutive, "Approved",
                gblIsCompliance, "Approved",
                "Approved"
            )
        );
        Set(locFilterMeetingType, Blank());
        Set(locFilterDocType, Blank());
        Set(locFilterDateFrom, Blank());
        Set(locFilterDateTo, Blank());

    cmpNav_Browser As cmpNavPanel:
        ActiveScreen: ="scrDocBrowser"
        X: =0
        Y: =0
        Width: =220
        Height: =Parent.Height

    lblBrowserTitle As Label:
        Text: ="Documents"
        X: =240
        Y: =16
        Width: =200
        Height: =40
        Size: =28
        FontWeight: =FontWeight.Semibold
        Color: =RGBA(50, 49, 48, 1)

    btnTabDraft As Button:
        Text: ="Draft"
        X: =240
        Y: =64
        Width: =120
        Height: =36
        Fill: =If(locActiveTab = "Draft", RGBA(0, 120, 212, 0.1), RGBA(255, 255, 255, 1))
        Color: =If(locActiveTab = "Draft", RGBA(0, 120, 212, 1), RGBA(96, 94, 92, 1))
        BorderColor: =RGBA(237, 235, 233, 1)
        BorderThickness: =1
        BorderRadius: =4
        Visible: =locShowDraft
        OnSelect: =Set(locActiveTab, "Draft")

    btnTabReview As Button:
        Text: ="Review"
        X: =368
        Y: =64
        Width: =120
        Height: =36
        Fill: =If(locActiveTab = "Review", RGBA(0, 120, 212, 0.1), RGBA(255, 255, 255, 1))
        Color: =If(locActiveTab = "Review", RGBA(0, 120, 212, 1), RGBA(96, 94, 92, 1))
        BorderColor: =RGBA(237, 235, 233, 1)
        BorderThickness: =1
        BorderRadius: =4
        Visible: =locShowReview
        OnSelect: =Set(locActiveTab, "Review")

    btnTabApproved As Button:
        Text: ="Approved"
        X: =496
        Y: =64
        Width: =120
        Height: =36
        Fill: =If(locActiveTab = "Approved", RGBA(0, 120, 212, 0.1), RGBA(255, 255, 255, 1))
        Color: =If(locActiveTab = "Approved", RGBA(0, 120, 212, 1), RGBA(96, 94, 92, 1))
        BorderColor: =RGBA(237, 235, 233, 1)
        BorderThickness: =1
        BorderRadius: =4
        Visible: =locShowApproved
        OnSelect: =Set(locActiveTab, "Approved")

    btnTabArchive As Button:
        Text: ="Archive"
        X: =624
        Y: =64
        Width: =120
        Height: =36
        Fill: =If(locActiveTab = "Archive", RGBA(0, 120, 212, 0.1), RGBA(255, 255, 255, 1))
        Color: =If(locActiveTab = "Archive", RGBA(0, 120, 212, 1), RGBA(96, 94, 92, 1))
        BorderColor: =RGBA(237, 235, 233, 1)
        BorderThickness: =1
        BorderRadius: =4
        Visible: =locShowArchive
        OnSelect: =Set(locActiveTab, "Archive")

    drpFilterMeetingType As DropDown:
        Items: =["(All)", "Board", "SteerCo", "ExecTeam", "Ad-Hoc"]
        X: =240
        Y: =112
        Width: =180
        Height: =36
        OnChange: =Set(locFilterMeetingType, If(Self.Selected.Value = "(All)", Blank(), Self.Selected.Value))

    drpFilterDocType As DropDown:
        Items: =["(All)", "Board Pack", "Research Summary", "Decision Record", "Meeting Minutes", "Supporting Material"]
        X: =432
        Y: =112
        Width: =200
        Height: =36
        OnChange: =Set(locFilterDocType, If(Self.Selected.Value = "(All)", Blank(), Self.Selected.Value))

    btnClearFilters As Button:
        Text: ="Clear filters"
        X: =Parent.Width - 160
        Y: =116
        Width: =120
        Height: =28
        Fill: =Transparent
        Color: =RGBA(0, 120, 212, 1)
        BorderThickness: =0
        OnSelect: |-
            =Set(locFilterMeetingType, Blank());
            Set(locFilterDocType, Blank());
            Set(locFilterDateFrom, Blank());
            Set(locFilterDateTo, Blank());
            Reset(drpFilterMeetingType);
            Reset(drpFilterDocType);

    galDocuments As Gallery.galleryVertical:
        X: =240
        Y: =160
        Width: =Parent.Width - 264
        Height: =Parent.Height - 180
        Fill: =RGBA(255, 255, 255, 1)
        BorderColor: =RGBA(237, 235, 233, 1)
        BorderThickness: =1
        BorderRadius: =8
        TemplatePadding: =4
        TemplateSize: =64
        Items: |-
            =SortByColumns(
                Filter(
                    Switch(
                        locActiveTab,
                        "Draft", Draft,
                        "Review", Review,
                        "Approved", Approved,
                        "Archive", Archive
                    ),
                    (IsBlank(locFilterMeetingType) || ExecWS_MeetingType.Value = locFilterMeetingType) &&
                    (IsBlank(locFilterDocType) || ExecWS_DocumentType = locFilterDocType)
                ),
                "ExecWS_MeetingDate", SortOrder.Descending
            )
        OnSelect: |-
            =Set(locSelectedDoc, ThisItem);
            Set(locSelectedDocLibrary, locActiveTab);
            Navigate(scrDocDetail, ScreenTransition.None);

        lblGalDocName As Label:
            Text: =ThisItem.{Name}
            X: =12
            Y: =4
            Width: =Parent.TemplateWidth - 180
            Height: =28
            Size: =14
            FontWeight: =FontWeight.Semibold
            Color: =RGBA(50, 49, 48, 1)

        lblGalBadge As Label:
            Text: =ThisItem.ExecWS_LifecycleState.Value
            X: =Parent.TemplateWidth - 120
            Y: =8
            Width: =100
            Height: =24
            Size: =11
            FontWeight: =FontWeight.Semibold
            Align: =Align.Center
            BorderRadius: =12
            Color: |-
                =Switch(
                    ThisItem.ExecWS_LifecycleState.Value,
                    "Draft", RGBA(0, 120, 212, 1),
                    "Review", RGBA(152, 111, 11, 1),
                    "Approved", RGBA(16, 124, 16, 1),
                    RGBA(115, 115, 115, 1)
                )
            Fill: |-
                =Switch(
                    ThisItem.ExecWS_LifecycleState.Value,
                    "Draft", RGBA(0, 120, 212, 0.1),
                    "Review", RGBA(255, 185, 0, 0.1),
                    "Approved", RGBA(16, 124, 16, 0.1),
                    RGBA(115, 115, 115, 0.1)
                )

        lblGalMeta As Label:
            Text: |-
                =Concatenate(
                    ThisItem.ExecWS_DocumentType, " │ ",
                    ThisItem.ExecWS_MeetingType.Value, " │ ",
                    Text(ThisItem.ExecWS_MeetingDate, "dd MMM yyyy"), " │ ",
                    ThisItem.ExecWS_DocumentOwner.DisplayName
                )
            X: =12
            Y: =34
            Width: =Parent.TemplateWidth - 40
            Height: =20
            Size: =11
            Color: =RGBA(96, 94, 92, 1)

        icoGalChevron As icon:
            Icon: =Icon.ChevronRight
            X: =Parent.TemplateWidth - 32
            Y: =20
            Width: =24
            Height: =24
            Color: =RGBA(200, 200, 200, 1)
